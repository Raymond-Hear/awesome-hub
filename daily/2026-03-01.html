<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容筹备中 | 龙虾工作台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6750a4;
      --primary-container: #eaddff;
      --surface: #fef7ff;
      --background: #fffbfe;
      --on-surface: #1c1b1f;
      --on-surface-variant: #49454f;
      --outline-variant: #cab6d0;
      --radius-xl: 32px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--on-surface);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    
    p {
      color: var(--on-surface-variant);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-block;
      padding: 0.875rem 1.5rem;
      background: var(--primary);
      color: white;
      border-radius: 28px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📝</div>
    <h1>内容筹备中</h1>
    <p>该日期的内容正在整理中，请查看其他日期或返回首页。</p>
    <a href="../archive.html" class="btn">返回归档</a>
  </div>
</body>
</html>
