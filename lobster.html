<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风崽的办公室 | 登录</title>
  <meta name="description" content="风崽办公室 - 需要登录">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6750a4;
      --primary-container: #eaddff;
      --on-primary: #ffffff;
      --on-primary-container: #21005d;
      --surface: #fef7ff;
      --background: #fffbfe;
      --on-surface: #1c1b1f;
      --on-surface-variant: #49454f;
      --outline: #79747e;
      --outline-variant: #cab6d0;
      --radius-lg: 28px;
      --radius-xl: 32px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--primary-container) 0%, var(--surface) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .login-container {
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(103, 80, 164, 0.15);
    }
    
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: var(--on-surface-variant);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }
    
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--on-surface);
      margin-bottom: 0.5rem;
    }
    
    input[type="password"] {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      background: var(--background);
      color: var(--on-surface);
      transition: all 0.2s;
    }
    
    input[type="password"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(103, 80, 164, 0.1);
    }
    
    .hint {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-top: 0.5rem;
    }
    
    button {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    
    button:hover {
      background: var(--on-primary-container);
      box-shadow: 0 4px 16px rgba(103, 80, 164, 0.3);
    }
    
    .error {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--on-surface-variant);
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .back-link:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🦞</div>
    <h1>风崽的办公室</h1>
    <p class="subtitle">此页面需要密码才能访问</p>
    
    <form id="login-form">
      <div class="form-group">
        <label for="password">访问密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="off">
        <p class="hint"></p>
      </div>
      
      <button type="submit">进入办公室</button>
    </form>
    
    <p class="error" id="error-msg">密码错误，请重试</p>
    
    <a href="./" class="back-link">← 返回首页</a>
  </div>

  <script>
    // 简单的密码保护（密码：lingfeng）
    const CORRECT_PASSWORD = 'lingfeng6768';
    
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      
      if (password === CORRECT_PASSWORD) {
        // 设置登录状态（24小时有效）
        localStorage.setItem('lobster_authenticated', 'true');
        localStorage.setItem('lobster_auth_time', Date.now().toString());
        
        // 跳转到真正的办公室页面
        window.location.href = './lobster-office.html';
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
      }
    });
    
    // 检查是否已登录
    if (localStorage.getItem('lobster_authenticated') === 'true') {
      const authTime = parseInt(localStorage.getItem('lobster_auth_time') || '0');
      const now = Date.now();
      
      // 24小时内免登录
      if (now - authTime < 24 * 60 * 60 * 1000) {
        window.location.href = './lobster-office.html';
      } else {
        // 过期清除
        localStorage.removeItem('lobster_authenticated');
        localStorage.removeItem('lobster_auth_time');
      }
    }
  </script>
</body>
</html>
