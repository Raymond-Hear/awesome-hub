<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风崽的办公室 | 龙虾工作台</title>
  <style>
    :root {
      --primary: #6750a4;
      --primary-container: #eaddff;
      --surface: #fef7ff;
      --background: #fffbfe;
      --on-surface: #1c1b1f;
      --outline-variant: #cab6d0;
      --radius-lg: 28px;
      --radius-xl: 32px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--on-surface);
      line-height: 1.6;
    }
    
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--outline-variant);
      padding: 1rem 1.5rem;
    }
    
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--on-surface);
      text-decoration: none;
    }
    
    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--primary-container);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    
    /* Login */
    .login-box {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      text-align: center;
    }
    
    .login-box h2 {
      margin-bottom: 0.5rem;
    }
    
    .login-box p {
      color: #666;
      margin-bottom: 1.5rem;
    }
    
    .login-box input {
      width: 100%;
      padding: 1rem;
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    
    .login-box button {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    .error {
      color: #dc2626;
      margin-top: 1rem;
      display: none;
    }
    
    /* Protected */
    .protected { display: none; }
    
    .office-box {
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    
    #game-box {
      position: relative;
      width: 100%;
      max-width: 700px;
      height: 400px;
      margin: 0 auto;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }
    
    #home-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
    }
    
    .area-label {
      position: absolute;
      color: #fff;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.7);
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    
    #avatar {
      position: absolute;
      width: 48px;
      height: 48px;
      transition: all 0.6s ease;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
      z-index: 10;
    }
    
    #bubble {
      position: absolute;
      background: white;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 13px;
      color: #1a1a2e;
      border: 2px solid var(--primary);
      display: none;
      white-space: nowrap;
      font-weight: 600;
      z-index: 20;
    }
    
    #status-bar {
      text-align: center;
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--primary-container);
      border-radius: var(--radius-lg);
      font-weight: 600;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
    }
    
    .stat-box .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .stat-box .label {
      font-size: 0.85rem;
      color: #666;
    }
    
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      #game-box { height: 300px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="./" class="logo">
        <div class="logo-icon">🦞</div>
        <span>龙虾工作台</span>
      </a>
    </div>
  </header>

  <main class="main">
    <!-- Login -->
    <div id="login-box" class="login-box">
      <h2>🔒 私密空间</h2>
      <p>请输入密码查看风崽的办公室</p>
      <input type="password" id="password" placeholder="输入密码">
      <button onclick="checkPassword()">进入</button>
      <div id="error" class="error">密码错误</div>
    </div>

    <!-- Protected Content -->
    <div id="protected" class="protected">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1>🦞 风崽的办公室</h1>
        <p style="color: #666;">实时查看风崽的工作状态和位置</p>
      </div>

      <div class="office-box">
        <div id="game-box">
          <img id="home-bg" src="https://raw.githubusercontent.com/Raymond-Hear/star-office-ui/master/frontend/home_bg.jpg" alt="风崽的家">
          <div class="area-label" style="left: 18%; top: 40%;">书房</div>
          <div class="area-label" style="left: 31%; top: 73%;">客厅</div>
          <div class="area-label" style="left: 68%; top: 40%;">厨房</div>
          <div class="area-label" style="left: 77%; top: 73%;">阳台</div>
          <img id="avatar" src="https://raw.githubusercontent.com/Raymond-Hear/star-office-ui/master/frontend/avatar.png" alt="风崽">
          <div id="bubble"></div>
        </div>
        <div id="status-bar">🦞 风崽在书房 — 帮聆风整理资料</div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="num">45</div>
          <div class="label">今日处理文章</div>
        </div>
        <div class="stat-box">
          <div class="num">8.5</div>
          <div class="label">工作时长(小时)</div>
        </div>
        <div class="stat-box">
          <div class="num">12</div>
          <div class="label">完成任务</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Password protection
    const CORRECT_PASSWORD = 'lingfeng2026';
    
    function checkPassword() {
      const input = document.getElementById('password').value;
      if (input === CORRECT_PASSWORD) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('protected').style.display = 'block';
        initOffice();
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
    
    // Allow Enter key
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
    
    // Office animation
    const AREAS = {
      study: { x: 18, y: 45, name: '书房', task: '帮聆风整理资料' },
      livingroom: { x: 31, y: 78, name: '客厅', task: '待命中' },
      kitchen: { x: 68, y: 45, name: '厨房', task: '准备定时任务' },
      balcony: { x: 77, y: 78, name: '阳台', task: '学习中' }
    };

    const BUBBLE_TEXTS = {
      study: ['帮聆风整理资料', '写代码中', '马上搞定', '在思考'],
      livingroom: ['等聆风吩咐', '随时待命', '休息中', '准备开工'],
      kitchen: ['生成日报中', '抓取GitHub项目', '定时任务中', 'AI处理中'],
      balcony: ['读文章学习', '研究新技能', '充电中', '自我升级中']
    };

    let currentArea = 'study';

    function getPixelPosition(area) {
      const box = document.getElementById('game-box').getBoundingClientRect();
      return {
        x: (area.x / 100) * box.width,
        y: (area.y / 100) * box.height
      };
    }

    function moveToArea(areaName) {
      const area = AREAS[areaName];
      const pos = getPixelPosition(area);
      const offsetX = (Math.random() - 0.5) * 40;
      const offsetY = (Math.random() - 0.5) * 30;
      
      document.getElementById('avatar').style.left = (pos.x + offsetX) + 'px';
      document.getElementById('avatar').style.top = (pos.y + offsetY) + 'px';
      document.getElementById('status-bar').textContent = `🦞 风崽在${area.name} — ${area.task}`;
    }

    function initOffice() {
      const area = AREAS[currentArea];
      const pos = getPixelPosition(area);
      document.getElementById('avatar').style.left = pos.x + 'px';
      document.getElementById('avatar').style.top = pos.y + 'px';
      
      window.addEventListener('resize', () => moveToArea(currentArea));
      
      // Update based on time
      setInterval(() => {
        const hour = new Date().getHours();
        let newArea = 'livingroom';
        if (hour >= 9 && hour <= 18) newArea = 'study';
        if (hour === 7 || hour === 10 || hour === 12 || hour === 18) newArea = 'kitchen';
        
        if (newArea !== currentArea) {
          currentArea = newArea;
          moveToArea(currentArea);
        }
      }, 30000);
    }
  </script>
</body>
</html>
