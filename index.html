<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Awesome Hub - 精选开源资源</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="精选 GitHub 开源资源榜单">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section h1 {
      font-size: 2.5rem;
      border-bottom: none;
    }
    .markdown-section h2 {
      font-size: 1.8rem;
      margin-top: 3rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #eaecef;
    }
    .markdown-section h3 {
      font-size: 1.3rem;
      margin-top: 2rem;
    }
    .markdown-section p {
      line-height: 1.8;
    }
    .markdown-section a {
      color: #0366d6;
      text-decoration: none;
    }
    .markdown-section a:hover {
      text-decoration: underline;
    }
    .github-corner svg {
      fill: #42b983;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Awesome Hub',
      repo: 'https://github.com/Raymond-Hear/awesome-hub',
      loadSidebar: false,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索...',
        noData: '未找到结果',
        depth: 2
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制'
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
</body>
</html>
